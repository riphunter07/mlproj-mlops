name: ML Pipeline

on:
  push:
    branches:
      - dev
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements_ci.txt

      - name: Install DVC
        run: |
          pip install dvc

      - name: Run DVC pipeline
        run: |
          dvc repro
